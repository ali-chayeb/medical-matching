<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام توزيع المناوبات - قسم العظمية | مشفى حلب الجامعي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a237e;
            --primary-light: #534bae;
            --primary-dark: #000051;
            --accent: #ff6f00;
            --accent-light: #ffa040;
            --accent-dark: #c43e00;
            --success: #00c853;
            --warning: #ffd600;
            --danger: #ff1744;
            --info: #00b0ff;
            --bg-light: #f5f7fa;
            --bg-white: #ffffff;
            --text-dark: #1a1a2e;
            --text-light: #6b7280;
            --text-white: #ffffff;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.12);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.1), 0 2px 4px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.15), 0 4px 10px rgba(0,0,0,0.1);
            --shadow-xl: 0 20px 40px rgba(0,0,0,0.2);
            --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-accent: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --gradient-success: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-info: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --gradient-warning: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-2xl: 24px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%23ffffff10" fill-opacity="0.1" d="M0,96L48,112C96,128,192,160,288,186.7C384,213,480,235,576,213.3C672,192,768,128,864,128C960,128,1056,192,1152,208C1248,224,1344,192,1392,176L1440,160L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>');
            background-size: cover;
            background-position: center;
            pointer-events: none;
            z-index: 0;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            animation-delay: var(--delay);
            opacity: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.5); }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Header Styles */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-2xl);
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: var(--shadow-xl);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .hospital-logo {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: var(--gradient-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .title-group h1 {
            font-size: 2.5em;
            font-weight: 900;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .title-group .subtitle {
            color: var(--text-light);
            font-size: 1.1em;
            margin-top: 5px;
        }

        /* Navigation Tabs */
        .nav-tabs {
            display: flex;
            background: white;
            border-radius: var(--radius-lg);
            padding: 5px;
            box-shadow: var(--shadow-sm);
        }

        .nav-tab {
            padding: 12px 30px;
            border: none;
            background: transparent;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            font-size: 1.1em;
            cursor: pointer;
            border-radius: var(--radius-md);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-light);
        }

        .nav-tab.active {
            background: var(--gradient-primary);
            color: white;
            box-shadow: var(--shadow-md);
        }

        .nav-tab:hover:not(.active) {
            background: rgba(102, 126, 234, 0.1);
        }

        /* Card Styles */
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-2xl);
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: var(--transition);
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-xl);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(102, 126, 234, 0.1);
        }

        .card-icon {
            width: 50px;
            height: 50px;
            background: var(--gradient-primary);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }

        .card-title {
            font-size: 1.5em;
            font-weight: 700;
            color: var(--text-dark);
        }

        /* Form Styles */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .form-group {
            position: relative;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.95em;
        }

        .form-input {
            width: 100%;
            padding: 14px 45px 14px 20px;
            border: 2px solid #e2e8f0;
            border-radius: var(--radius-lg);
            font-family: 'Cairo', sans-serif;
            font-size: 1em;
            transition: var(--transition);
            background: white;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .form-icon {
            position: absolute;
            right: 15px;
            top: 45px;
            color: #667eea;
            font-size: 1.2em;
        }

        .btn {
            padding: 14px 30px;
            border: none;
            border-radius: var(--radius-lg);
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 1em;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .btn-success {
            background: var(--gradient-success);
            color: white;
            box-shadow: 0 10px 25px rgba(0, 200, 83, 0.3);
        }

        .btn-info {
            background: var(--gradient-info);
            color: white;
            box-shadow: 0 10px 25px rgba(0, 176, 255, 0.3);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-xl);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* View Toggle */
        .views-container {
            display: none;
        }

        .views-container.active {
            display: block;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Calendar Grid */
        .calendar-legend {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .legend-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }

        .legend-dot.er { background: linear-gradient(135deg, #ff6b6b, #ee5a24); }
        .legend-dot.ward { background: linear-gradient(135deg, #0abde3, #48dbfb); }
        .legend-dot.or { background: linear-gradient(135deg, #10ac84, #1dd1a1); }
        .legend-dot.holiday { background: linear-gradient(135deg, #feca57, #ff9ff3); }
        .legend-dot.free { background: #dfe6e9; }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .calendar-day {
            background: white;
            border-radius: var(--radius-md);
            padding: 15px 10px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            border: 2px solid transparent;
            min-height: 120px;
        }

        .calendar-day:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
            border-color: #667eea;
        }

        .calendar-day.today {
            border-color: #667eea;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
        }

        .calendar-day.holiday {
            background: linear-gradient(135deg, #fff9e6, #ffe0b2);
        }

        .day-number {
            font-size: 1.2em;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .holiday-badge {
            background: var(--gradient-accent);
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7em;
            font-weight: 600;
        }

        .shift-tags {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .shift-tag {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: 600;
            color: white;
            text-align: center;
            transition: var(--transition);
            cursor: pointer;
        }

        .shift-tag:hover {
            transform: scale(1.05);
        }

        .shift-tag.er {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
        }

        .shift-tag.ward {
            background: linear-gradient(135deg, #0abde3, #48dbfb);
        }

        .shift-tag.or {
            background: linear-gradient(135deg, #10ac84, #1dd1a1);
        }

        .shift-tag.empty {
            background: #dfe6e9;
            color: #636e72;
        }

        /* Student Search */
        .search-container {
            position: relative;
            margin-bottom: 30px;
        }

        .search-input {
            width: 100%;
            padding: 18px 60px 18px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 50px;
            font-family: 'Cairo', sans-serif;
            font-size: 1.1em;
            transition: var(--transition);
            background: white;
            box-shadow: var(--shadow-md);
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 5px rgba(102, 126, 234, 0.1);
        }

        .search-icon {
            position: absolute;
            right: 25px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            font-size: 1.3em;
        }

        .student-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .student-card {
            background: white;
            border-radius: var(--radius-xl);
            padding: 25px;
            box-shadow: var(--shadow-md);
            transition: var(--transition);
            border: 2px solid transparent;
            cursor: pointer;
        }

        .student-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-xl);
            border-color: #667eea;
        }

        .student-avatar {
            width: 70px;
            height: 70px;
            background: var(--gradient-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: white;
            margin: 0 auto 15px;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }

        .student-name {
            font-size: 1.3em;
            font-weight: 700;
            text-align: center;
            color: var(--text-dark);
            margin-bottom: 15px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .stat-box {
            background: var(--bg-light);
            padding: 12px;
            border-radius: var(--radius-md);
            text-align: center;
            transition: var(--transition);
        }

        .stat-box:hover {
            background: rgba(102, 126, 234, 0.1);
            transform: scale(1.05);
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: 900;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.8em;
            color: var(--text-light);
            font-weight: 600;
        }

        .cumulative-section {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05), rgba(118, 75, 162, 0.05));
            border-radius: var(--radius-lg);
            padding: 15px;
            margin-top: 15px;
        }

        .cumulative-title {
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .progress-bar {
            background: #e2e8f0;
            border-radius: 20px;
            height: 8px;
            margin: 10px 0;
            overflow: hidden;
        }

        .progress-fill {
            background: var(--gradient-primary);
            height: 100%;
            border-radius: 20px;
            transition: width 1s ease;
        }

        /* Loading Overlay */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .loading-spinner {
            background: white;
            padding: 40px;
            border-radius: var(--radius-2xl);
            text-align: center;
            box-shadow: var(--shadow-xl);
        }

        .spinner-circle {
            width: 60px;
            height: 60px;
            border: 5px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: white;
            padding: 20px 25px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            z-index: 1001;
            animation: slideInRight 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
            border-right: 4px solid #667eea;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }

            .calendar-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .student-grid {
                grid-template-columns: 1fr;
            }

            .nav-tabs {
                flex-direction: column;
            }

            .title-group h1 {
                font-size: 1.8em;
            }
        }

        .month-stats-bar {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .month-stat-card {
            flex: 1;
            min-width: 200px;
            background: white;
            padding: 20px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            text-align: center;
            transition: var(--transition);
        }

        .month-stat-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }

        .month-stat-icon {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .month-stat-value {
            font-size: 2em;
            font-weight: 900;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .month-stat-label {
            color: var(--text-light);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner">
            <div class="spinner-circle"></div>
            <p style="font-weight: 600; color: var(--text-dark);">جاري تحميل البيانات...</p>
        </div>
    </div>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-content">
                <div class="hospital-logo">
                    <div class="logo-icon">
                        <i class="fas fa-hospital"></i>
                    </div>
                    <div class="title-group">
                        <h1>نظام توزيع المناوبات</h1>
                        <p class="subtitle">قسم الجراحة العظمية - مشفى حلب الجامعي</p>
                    </div>
                </div>
                <div class="nav-tabs">
                    <button class="nav-tab active" onclick="switchView('setup')">
                        <i class="fas fa-cog"></i> الإعدادات
                    </button>
                    <button class="nav-tab" onclick="switchView('calendar')">
                        <i class="fas fa-calendar-alt"></i> الجدول الشهري
                    </button>
                    <button class="nav-tab" onclick="switchView('students')">
                        <i class="fas fa-user-graduate"></i> بحث الطلاب
                    </button>
                </div>
            </div>
        </div>

        <!-- Setup View -->
        <div class="views-container active" id="setupView">
            <div class="card">
                <div class="card-header">
                    <div class="card-icon">
                        <i class="fas fa-database"></i>
                    </div>
                    <div class="card-title">تحميل البيانات والإعدادات</div>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">📊 معرف ملف Google Sheets</label>
                        <i class="fas fa-table form-icon"></i>
                        <input type="text" class="form-input" id="sheetId" placeholder="أدخل ID الملف">
                    </div>
                    <div class="form-group">
                        <label class="form-label">📅 الشهر المستهدف للتوزيع</label>
                        <i class="fas fa-calendar form-icon"></i>
                        <select class="form-input" id="targetMonth">
                            <option value="6">الشهر السابع (يوليو) - العمود F</option>
                            <option value="7">الشهر الثامن (أغسطس) - العمود G</option>
                            <option value="8">الشهر التاسع (سبتمبر) - العمود H</option>
                            <option value="9">الشهر العاشر (أكتوبر) - العمود I</option>
                            <option value="10">الشهر الحادي عشر (نوفمبر) - العمود J</option>
                            <option value="11">الشهر الثاني عشر (ديسمبر) - العمود K</option>
                        </select>
                    </div>
                </div>
                <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                    <button class="btn btn-primary" onclick="loadData()">
                        <i class="fas fa-download"></i> تحميل البيانات
                    </button>
                    <button class="btn btn-success" id="generateBtn" disabled onclick="generateSchedule()">
                        <i class="fas fa-magic"></i> توزيع المناوبات
                    </button>
                    <button class="btn btn-info" id="exportBtn" disabled onclick="exportToSheets()">
                        <i class="fas fa-cloud-upload-alt"></i> تصدير للـ Sheets
                    </button>
                </div>
            </div>
        </div>

        <!-- Calendar View -->
        <div class="views-container" id="calendarView">
            <div class="card">
                <div class="card-header">
                    <div class="card-icon">
                        <i class="fas fa-calendar-week"></i>
                    </div>
                    <div class="card-title">الجدول الشهري للمناوبات</div>
                    <div style="margin-right: auto;">
                        <select class="form-input" id="viewMonth" onchange="renderCalendar()" style="width: auto;">
                            <option value="6">الشهر السابع (يوليو)</option>
                            <option value="7">الشهر الثامن (أغسطس)</option>
                            <option value="8">الشهر التاسع (سبتمبر)</option>
                            <option value="9">الشهر العاشر (أكتوبر)</option>
                            <option value="10">الشهر الحادي عشر (نوفمبر)</option>
                            <option value="11">الشهر الثاني عشر (ديسمبر)</option>
                        </select>
                    </div>
                </div>
                
                <div class="calendar-legend">
                    <div class="legend-item"><span class="legend-dot er"></span> مناوبة الإسعاف</div>
                    <div class="legend-item"><span class="legend-dot ward"></span> مناوبة الجناح</div>
                    <div class="legend-item"><span class="legend-dot or"></span> مناوبة العمليات</div>
                    <div class="legend-item"><span class="legend-dot holiday"></span> يوم عطلة</div>
                </div>

                <div class="month-stats-bar" id="monthStats"></div>
                <div class="calendar-grid" id="calendarGrid"></div>
            </div>
        </div>

        <!-- Students View -->
        <div class="views-container" id="studentsView">
            <div class="card">
                <div class="card-header">
                    <div class="card-icon">
                        <i class="fas fa-search"></i>
                    </div>
                    <div class="card-title">بحث عن طالب</div>
                </div>
                <div class="search-container">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" class="search-input" id="searchStudent" 
                           placeholder="🔍 اكتب اسم الطالب للبحث..." 
                           oninput="renderStudentCards()">
                </div>
                <div class="student-grid" id="studentGrid"></div>
            </div>
        </div>
    </div>

    <script>
        // Global state
        let studentsData = [];
        let schedule = {};
        let sheetId = '';
        
        const MONTHS = {
            6: { name: 'الشهر السابع - يوليو 2026', days: 31, column: 'F' },
            7: { name: 'الشهر الثامن - أغسطس 2026', days: 31, column: 'G' },
            8: { name: 'الشهر التاسع - سبتمبر 2026', days: 30, column: 'H' },
            9: { name: 'الشهر العاشر - أكتوبر 2026', days: 31, column: 'I' },
            10: { name: 'الشهر الحادي عشر - نوفمبر 2026', days: 30, column: 'J' },
            11: { name: 'الشهر الثاني عشر - ديسمبر 2026', days: 31, column: 'K' }
        };

        // Generate stars background
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = star.style.height = Math.random() * 3 + 1 + 'px';
                star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
                star.style.setProperty('--delay', Math.random() * 3 + 's');
                starsContainer.appendChild(star);
            }
        }

        // Show loading
        function showLoading() {
            document.getElementById('loadingOverlay').style.display = 'flex';
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        // Show toast
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            const icons = {
                success: '✅',
                error: '❌',
                info: 'ℹ️'
            };
            toast.innerHTML = `${icons[type]} ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Switch views
        function switchView(viewName) {
            document.querySelectorAll('.views-container').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            
            document.getElementById(viewName + 'View').classList.add('active');
            event.target.closest('.nav-tab').classList.add('active');
            
            if (viewName === 'calendar') renderCalendar();
            if (viewName === 'students') renderStudentCards();
        }

        // Load data (simulated)
        async function loadData() {
            sheetId = document.getElementById('sheetId').value.trim();
            if (!sheetId) {
                showToast('الرجاء إدخال ID ملف Google Sheets', 'error');
                return;
            }

            showLoading();
            
            try {
                await new Promise(resolve => setTimeout(resolve, 1500));
                studentsData = generateSampleData();
                
                document.getElementById('generateBtn').disabled = false;
                showToast(`تم تحميل بيانات ${studentsData.length} طالب بنجاح!`, 'success');
            } catch (error) {
                showToast('حدث خطأ في تحميل البيانات', 'error');
            } finally {
                hideLoading();
            }
        }

        // Generate sample data
        function generateSampleData() {
            const names = [
                'أحمد محمد', 'عمر خالد', 'حسن علي', 'محمود سامر', 'خالد وليد',
                'سامر فادي', 'محمد ناصر', 'علي حسين', 'يوسف أحمد', 'إبراهيم سعيد',
                'طارق محمود', 'باسل عمر', 'أنس خليل', 'رامي جهاد', 'نضال سمير',
                'عامر سهيل', 'فراس كمال', 'هيثم نور', 'وسام بشار', 'زياد مازن'
            ];

            return names.map((name, index) => ({
                id: index,
                name: name,
                cumulativeHolidays: Math.floor(Math.random() * 5),
                cumulativeER: Math.floor(Math.random() * 15) + 5,
                cumulativeWard: Math.floor(Math.random() * 8) + 2,
                cumulativeOR: Math.floor(Math.random() * 8) + 2,
                monthHolidays: {}
            }));
        }

        // Get holidays for a month
        function getHolidays(month, daysInMonth) {
            const holidays = new Set();
            // Simple pattern - Fridays and Saturdays
            for (let day = 1; day <= daysInMonth; day++) {
                if (day % 7 === 5 || day % 7 === 6) {
                    holidays.add(day);
                }
            }
            // Add some random holidays
            holidays.add(15);
            holidays.add(25);
            return holidays;
        }

        // Generate schedule
        function generateSchedule() {
            if (studentsData.length === 0) {
                showToast('الرجاء تحميل البيانات أولاً', 'error');
                return;
            }

            const targetMonth = parseInt(document.getElementById('targetMonth').value);
            const daysInMonth = MONTHS[targetMonth].days;
            const holidays = getHolidays(targetMonth, daysInMonth);
            
            const shiftsPerStudent = {
                er: Math.floor((5 * daysInMonth) / studentsData.length),
                ward: Math.floor((1 * daysInMonth) / studentsData.length),
                or: Math.floor((1 * daysInMonth) / studentsData.length)
            };

            const monthSchedule = {};
            
            studentsData.forEach(student => {
                monthSchedule[student.id] = {
                    name: student.name,
                    schedule: {},
                    stats: { er: 0, ward: 0, or: 0, holidayShifts: 0 },
                    cumulative: {
                        holidays: student.cumulativeHolidays,
                        er: student.cumulativeER,
                        ward: student.cumulativeWard,
                        or: student.cumulativeOR
                    }
                };
            });

            // Distribute ER shifts (5 per day)
            for (let day = 1; day <= daysInMonth; day++) {
                const available = studentsData
                    .filter(s => monthSchedule[s.id].stats.er < shiftsPerStudent.er)
                    .sort((a, b) => {
                        const totalA = Object.values(monthSchedule[a.id].stats).reduce((x,y) => x+y, 0);
                        const totalB = Object.values(monthSchedule[b.id].stats).reduce((x,y) => x+y, 0);
                        return totalA - totalB;
                    });

                const selected = available.slice(0, Math.min(5, available.length));
                selected.forEach(student => {
                    monthSchedule[student.id].schedule[day] = 'ER';
                    monthSchedule[student.id].stats.er++;
                    if (holidays.has(day)) monthSchedule[student.id].stats.holidayShifts++;
                });
            }

            // Distribute Ward shifts (1 per day)
            for (let day = 1; day <= daysInMonth; day++) {
                const available = studentsData
                    .filter(s => !monthSchedule[s.id].schedule[day] && 
                                monthSchedule[s.id].stats.ward < shiftsPerStudent.ward)
                    .sort((a, b) => {
                        const totalA = Object.values(monthSchedule[a.id].stats).reduce((x,y) => x+y, 0);
                        const totalB = Object.values(monthSchedule[b.id].stats).reduce((x,y) => x+y, 0);
                        return totalA - totalB;
                    });

                if (available.length > 0) {
                    const selected = available[0];
                    monthSchedule[selected.id].schedule[day] = 'WARD';
                    monthSchedule[selected.id].stats.ward++;
                    if (holidays.has(day)) monthSchedule[selected.id].stats.holidayShifts++;
                }
            }

            // Distribute OR shifts (1 per day)
            for (let day = 1; day <= daysInMonth; day++) {
                const available = studentsData
                    .filter(s => !monthSchedule[s.id].schedule[day] && 
                                monthSchedule[s.id].stats.or < shiftsPerStudent.or)
                    .sort((a, b) => {
                        const totalA = Object.values(monthSchedule[a.id].stats).reduce((x,y) => x+y, 0);
                        const totalB = Object.values(monthSchedule[b.id].stats).reduce((x,y) => x+y, 0);
                        return totalA - totalB;
                    });

                if (available.length > 0) {
                    const selected = available[0];
                    monthSchedule[selected.id].schedule[day] = 'OR';
                    monthSchedule[selected.id].stats.or++;
                    if (holidays.has(day)) monthSchedule[selected.id].stats.holidayShifts++;
                }
            }

            schedule = { [targetMonth]: { schedule: monthSchedule, holidays: Array.from(holidays) } };
            
            document.getElementById('exportBtn').disabled = false;
            renderCalendar();
            switchView('calendar');
            showToast('تم توزيع المناوبات بنجاح! 🎉', 'success');
        }

        // Render calendar view
        function renderCalendar() {
            const viewMonth = parseInt(document.getElementById('viewMonth').value);
            const daysInMonth = MONTHS[viewMonth].days;
            const monthData = schedule[viewMonth];
            const calendarGrid = document.getElementById('calendarGrid');
            const monthStats = document.getElementById('monthStats');
            
            if (!monthData) {
                calendarGrid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 50px; color: var(--text-light);">
                        <i class="fas fa-calendar-times" style="font-size: 3em; margin-bottom: 20px; display: block;"></i>
                        <p style="font-size: 1.2em;">لم يتم توزيع المناوبات لهذا الشهر بعد</p>
                    </div>`;
                monthStats.innerHTML = '';
                return;
            }

            // Render stats
            const { schedule: monthSchedule, holidays } = monthData;
            const allStats = Object.values(monthSchedule);
            const totalER = allStats.reduce((s, st) => s + st.stats.er, 0);
            const totalWard = allStats.reduce((s, st) => s + st.stats.ward, 0);
            const totalOR = allStats.reduce((s, st) => s + st.stats.or, 0);
            const totalHolidayShifts = allStats.reduce((s, st) => s + st.stats.holidayShifts, 0);

            monthStats.innerHTML = `
                <div class="month-stat-card">
                    <div class="month-stat-icon">🚑</div>
                    <div class="month-stat-value">${totalER}</div>
                    <div class="month-stat-label">مناوبات الإسعاف</div>
                </div>
                <div class="month-stat-card">
                    <div class="month-stat-icon">🏥</div>
                    <div class="month-stat-value">${totalWard}</div>
                    <div class="month-stat-label">مناوبات الجناح</div>
                </div>
                <div class="month-stat-card">
                    <div class="month-stat-icon">🔪</div>
                    <div class="month-stat-value">${totalOR}</div>
                    <div class="month-stat-label">مناوبات العمليات</div>
                </div>
                <div class="month-stat-card">
                    <div class="month-stat-icon">🎯</div>
                    <div class="month-stat-value">${totalHolidayShifts}</div>
                    <div class="month-stat-label">مناوبات أيام العطل</div>
                </div>
            `;

            // Render calendar grid
            calendarGrid.innerHTML = '';
            
            // Day headers
            const dayNames = ['السبت', 'الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة'];
            dayNames.forEach(day => {
                const header = document.createElement('div');
                header.style.cssText = 'text-align: center; font-weight: 700; padding: 10px; color: var(--primary);';
                header.textContent = day;
                calendarGrid.appendChild(header);
            });

            // Fill empty cells at start
            const firstDayOffset = 0; // Adjust based on actual calendar
            for (let i = 0; i < firstDayOffset; i++) {
                const empty = document.createElement('div');
                calendarGrid.appendChild(empty);
            }

            // Render days
            for (let day = 1; day <= daysInMonth; day++) {
                const dayCell = document.createElement('div');
                dayCell.className = 'calendar-day';
                if (holidays && holidays.includes(day)) {
                    dayCell.classList.add('holiday');
                }

                const erStaff = [];
                const wardStaff = [];
                const orStaff = [];

                Object.values(monthSchedule).forEach(student => {
                    if (student.schedule[day] === 'ER') erStaff.push(student.name.split(' ')[0]);
                    if (student.schedule[day] === 'WARD') wardStaff.push(student.name.split(' ')[0]);
                    if (student.schedule[day] === 'OR') orStaff.push(student.name.split(' ')[0]);
                });

                dayCell.innerHTML = `
                    <div class="day-number">
                        ${day}
                        ${holidays && holidays.includes(day) ? '<span class="holiday-badge">عطلة</span>' : ''}
                    </div>
                    <div class="shift-tags">
                        ${erStaff.map(name => `<div class="shift-tag er" title="${name}">🚑 ${name}</div>`).join('')}
                        ${wardStaff.map(name => `<div class="shift-tag ward" title="${name}">🏥 ${name}</div>`).join('')}
                        ${orStaff.map(name => `<div class="shift-tag or" title="${name}">🔪 ${name}</div>`).join('')}
                        ${erStaff.length === 0 && wardStaff.length === 0 && orStaff.length === 0 ? 
                          '<div class="shift-tag empty">-</div>' : ''}
                    </div>
                `;

                calendarGrid.appendChild(dayCell);
            }
        }

        // Render student cards
        function renderStudentCards() {
            const searchTerm = document.getElementById('searchStudent').value.toLowerCase();
            const studentGrid = document.getElementById('studentGrid');
            
            if (studentsData.length === 0) {
                studentGrid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 50px;">
                        <i class="fas fa-user-slash" style="font-size: 3em; color: var(--text-light);"></i>
                        <p style="margin-top: 20px; color: var(--text-light);">لا توجد بيانات طلاب. قم بتحميل البيانات أولاً.</p>
                    </div>`;
                return;
            }

            const filtered = studentsData.filter(s => s.name.toLowerCase().includes(searchTerm));
            
            if (filtered.length === 0) {
                studentGrid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 50px;">
                        <i class="fas fa-search" style="font-size: 3em; color: var(--text-light);"></i>
                        <p style="margin-top: 20px; color: var(--text-light);">لا يوجد طلاب مطابقين للبحث</p>
                    </div>`;
                return;
            }

            studentGrid.innerHTML = filtered.map(student => {
                const currentMonth = parseInt(document.getElementById('viewMonth')?.value || 6);
                const monthData = schedule[currentMonth]?.schedule?.[student.id];
                const stats = monthData?.stats || { er: 0, ward: 0, or: 0, holidayShifts: 0 };
                
                const totalCurrent = stats.er + stats.ward + stats.or;
                const totalCumulative = student.cumulativeER + student.cumulativeWard + student.cumulativeOR;

                return `
                    <div class="student-card">
                        <div class="student-avatar">
                            <i class="fas fa-user-md"></i>
                        </div>
                        <div class="student-name">${student.name}</div>
                        
                        <div class="stats-grid">
                            <div class="stat-box">
                                <div class="stat-value">${stats.er}</div>
                                <div class="stat-label">🚑 إسعاف</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-value">${stats.ward}</div>
                                <div class="stat-label">🏥 جناح</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-value">${stats.or}</div>
                                <div class="stat-label">🔪 عمليات</div>
                            </div>
                        </div>
                        
                        <div style="text-align: center; margin: 10px 0;">
                            <span style="font-weight: 700; color: var(--primary);">📊 إجمالي المناوبات هذا الشهر: ${totalCurrent}</span>
                        </div>
                        
                        <div style="text-align: center; margin: 10px 0;">
                            <span style="font-weight: 700; color: #ff6b6b;">🎯 مناوبات أيام العطل: ${stats.holidayShifts}</span>
                        </div>

                        <div class="cumulative-section">
                            <div class="cumulative-title">
                                <i class="fas fa-chart-bar"></i> الإحصائيات التراكمية
                            </div>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.9em;">
                                <div>🚑 إسعاف: <strong>${student.cumulativeER}</strong></div>
                                <div>🏥 جناح: <strong>${student.cumulativeWard}</strong></div>
                                <div>🔪 عمليات: <strong>${student.cumulativeOR}</strong></div>
                                <div>🏖️ عطل: <strong>${student.cumulativeHolidays}</strong></div>
                            </div>
                            <div style="margin-top: 12px;">
                                <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                                    <span>نسبة الإكمال</span>
                                    <span><strong>${Math.round((totalCurrent / 30) * 100)}%</strong></span>
                                </div>
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${Math.min((totalCurrent / 30) * 100, 100)}%;"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Export function
        function exportToSheets() {
            showToast('جاري تجهيز البيانات للتصدير...', 'info');
            // Implement actual Google Sheets API export here
            setTimeout(() => {
                showToast('تم تصدير البيانات بنجاح! 📤', 'success');
            }, 1500);
        }

        // Initialize
        window.addEventListener('load', () => {
            createStars();
            
            const urlParams = new URLSearchParams(window.location.search);
            const sheetIdFromUrl = urlParams.get('sheetId');
            if (sheetIdFromUrl) {
                document.getElementById('sheetId').value = sheetIdFromUrl;
            }
        });

        // Handle Enter key in search
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && document.activeElement.id === 'sheetId') {
                loadData();
            }
        });
    </script>
